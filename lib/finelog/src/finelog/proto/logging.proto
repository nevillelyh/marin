edition = "2023";

package finelog.logging;

// Timestamp representing milliseconds since Unix epoch. Inlined here (not a
// separate time.proto) so the file basename does not collide with iris's
// time.proto in the protobuf descriptor pool when both packages load.
message Timestamp {
  int64 epoch_ms = 1;
}

// Best-effort parsed log level for a log entry.
enum LogLevel {
  LOG_LEVEL_UNKNOWN = 0;   // Could not parse a level from the log line
  LOG_LEVEL_DEBUG = 1;
  LOG_LEVEL_INFO = 2;
  LOG_LEVEL_WARNING = 3;
  LOG_LEVEL_ERROR = 4;
  LOG_LEVEL_CRITICAL = 5;
}

// One log entry. Used both for RPC responses and for persistence.
//
// Keys are opaque strings — finelog does not parse or interpret them.
// Conventions like "/user/<job>/<task>:<attempt>" or "/system/worker/<id>"
// are caller-defined.
message LogEntry {
  Timestamp timestamp = 1;
  string source = 2;      // Free-form: "stdout", "stderr", "build", "process", ...
  string data = 3;        // Log line content
  int32 attempt_id = 4;   // Caller-defined; finelog stores and echoes it back
  LogLevel level = 5;     // Best-effort parsed level (UNKNOWN if unparseable)
  string key = 6;         // Log store key. Populated on multi-key (regex) queries.
}

// Collection of log entries for a single source.
message LogBatch {
  repeated LogEntry entries = 1;
}

// ============================================================================
// LOG SERVICE
// ============================================================================

message PushLogsRequest {
  string key = 1;
  repeated LogEntry entries = 2;
}

message PushLogsResponse {}

// How the server should interpret FetchLogsRequest.source.
//
// `source` is always treated as a literal string for EXACT and PREFIX. The
// server never inspects it for regex metacharacters; literal `+`, `.`, etc.
// match themselves. UNSPECIFIED is treated as PREFIX so old callers get
// path-style reads (everything under `/job/<job>/<task>`); set EXACT
// explicitly when only the literal key should match. Use REGEX explicitly
// when regex semantics are wanted.
enum MatchScope {
  // Treated as MATCH_SCOPE_PREFIX by the server. Old callers that pass a
  // path-style key (`/job/<job>/<task>`) without a scope read every entry
  // under that path. Set MATCH_SCOPE_EXACT explicitly when only the
  // literal key should match.
  MATCH_SCOPE_UNSPECIFIED = 0;
  // Exact match: read entries whose key equals `source` byte-for-byte.
  MATCH_SCOPE_EXACT = 1;
  // Literal prefix: read entries whose key starts with `source`. Callers
  // include any boundary character (`/`, `:`) in `source` themselves; the
  // server does not append delimiters.
  MATCH_SCOPE_PREFIX = 2;
  // Regex: `source` is a regex pattern matched against the key. Use only
  // when regex semantics are actually needed; PREFIX covers the common
  // "all attempts of a task" / "all tasks of a job" cases without the
  // metacharacter footguns.
  MATCH_SCOPE_REGEX = 3;
}

message FetchLogsRequest {
  string source = 1;           // Log source key, prefix, or regex pattern (see match_scope)
  int64 since_ms = 2;          // Only return entries with epoch_ms > since_ms
  int64 cursor = 3;            // Resume after this autoincrement id (exclusive)
  string substring = 4;        // Literal substring match on log data
  int32 max_lines = 5;         // Max entries to return (0 = server default 1000)
  bool tail = 6;               // Return last N entries instead of first N
  string min_level = 7;        // Minimum level (DEBUG/INFO/WARNING/ERROR/CRITICAL)
  MatchScope match_scope = 8;  // How `source` is interpreted (UNSPECIFIED == PREFIX)
}

message FetchLogsResponse {
  repeated LogEntry entries = 1;
  int64 cursor = 2;            // Max autoincrement id seen (cursor for next poll)
}

service LogService {
  rpc PushLogs(PushLogsRequest) returns (PushLogsResponse);
  rpc FetchLogs(FetchLogsRequest) returns (FetchLogsResponse);
}
