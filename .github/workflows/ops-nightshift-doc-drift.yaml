name: "Ops - Nightshift Doc Drift"

on:
  schedule:
    - cron: '0 11 * * 0'
  workflow_dispatch: {}

concurrency:
  group: nightshift-doc-drift
  cancel-in-progress: false

jobs:
  doc-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NIGHTSHIFT_APP_ID }}
          private-key: ${{ secrets.NIGHTSHIFT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Detect documentation drift
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python infra/scripts/nightshift_doc_drift.py --run-id ${{ github.run_id }} --run-attempt ${{ github.run_attempt }}
