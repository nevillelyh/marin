name: "Marin - Smoke - Datakit"

on:
  schedule:
    - cron: '30 6 * * *'  # Daily at 06:30 UTC, offset from canary
  workflow_dispatch:

permissions:
  contents: read
  issues: write    # claude triage files issues
  id-token: write  # claude-code-action OIDC

jobs:
  datakit-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: datakit-smoke
      cancel-in-progress: true
    env:
      SMOKE_RUN_ID: datakit-smoke-${{ github.run_id }}-${{ github.run_attempt }}
      FERRY_STATUS_PATH: gs://marin-us-central1/tmp/ttl=1d/ci/datakit-smoke-${{ github.run_id }}-${{ github.run_attempt }}/ferry_run_status.json
      WANDB_ENTITY: marin-community
      WANDB_PROJECT: marin
      IRIS_CONFIG: lib/iris/examples/marin.yaml
      IRIS_CONTROLLER_SERVICE_ACCOUNT: iris-controller@hai-gcp-models.iam.gserviceaccount.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --extra=cpu --no-default-groups

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.IRIS_CI_GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.IRIS_CI_GCP_SSH_KEY }}
          SSH_KEY_PUB: ${{ secrets.IRIS_CI_GCP_SSH_KEY_PUB }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/google_compute_engine
          printf '%s\n' "$SSH_KEY_PUB" > ~/.ssh/google_compute_engine.pub
          chmod 600 ~/.ssh/google_compute_engine
          chmod 644 ~/.ssh/google_compute_engine.pub

      - name: Submit datakit smoke ferry
        id: submit
        shell: bash -l {0}
        run: |
          JOB_ID=$(.venv/bin/iris --config=${{ env.IRIS_CONFIG }} \
            job run --no-wait \
            --memory=2G --disk=4G --cpu=1 --extra=cpu \
            --priority production \
            -e SMOKE_RUN_ID "$SMOKE_RUN_ID" \
            -e FERRY_STATUS_PATH "$FERRY_STATUS_PATH" \
            -e WANDB_ENTITY "$WANDB_ENTITY" \
            -e WANDB_PROJECT "$WANDB_PROJECT" \
            -e WANDB_API_KEY "$WANDB_API_KEY" \
            -e HF_TOKEN "$HF_TOKEN" \
            -- python -m experiments.ferries.datakit_ferry)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted job: $JOB_ID"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Wait for datakit smoke ferry
        shell: bash -l {0}
        run: |
          uv run python scripts/workflows/iris_monitor.py wait \
            --job-id "${{ steps.submit.outputs.job_id }}" \
            --iris-config "${{ env.IRIS_CONFIG }}" \
            --poll-interval 30 \
            --timeout 7100 \
            --github-output

      - name: Read ferry status
        id: ferry_status
        shell: bash -l {0}
        run: |
          PREFIX=$(.venv/bin/python -c "
          import json
          from rigging.filesystem import url_to_fs
          fs, _ = url_to_fs('$FERRY_STATUS_PATH')
          with fs.open('$FERRY_STATUS_PATH') as f:
              print(json.load(f)['marin_prefix'])
          ")
          echo "marin_prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "Ferry output prefix: $PREFIX"

      - name: Validate datakit smoke outputs
        shell: bash -l {0}
        env:
          MARIN_PREFIX: ${{ steps.ferry_status.outputs.marin_prefix }}
        run: .venv/bin/python scripts/datakit/validate_ferry_outputs.py

      - name: Capture failure diagnostics
        if: failure() || cancelled()
        continue-on-error: true
        env:
          JOB_ID: ${{ steps.submit.outputs.job_id }}
          DIAG_DIR: ${{ github.workspace }}/datakit-smoke-diagnostics
        run: |
          mkdir -p "$DIAG_DIR"
          uv run python scripts/workflows/iris_monitor.py collect \
            --job-id "$JOB_ID" \
            --iris-config "${{ env.IRIS_CONFIG }}" \
            --provider gcp \
            --output-dir "$DIAG_DIR" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --controller-label iris-marin-controller \
            --service-account "$IRIS_CONTROLLER_SERVICE_ACCOUNT" \
            --ssh-key ~/.ssh/google_compute_engine

      - name: Upload diagnostics
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: datakit-smoke-diagnostics
          path: datakit-smoke-diagnostics/
          retention-days: 14
          if-no-files-found: ignore

      # The canary-triage skill handles both lanes; CANARY_LANE selects datakit-smoke vs tpu.
      - name: Claude triage
        id: claude_triage
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        uses: ./.github/actions/claude-triage
        with:
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CLAUDE_MAX_OAUTH_TOKEN }}
          lane: datakit-smoke
          job-id: ${{ steps.submit.outputs.job_id }}
          run-id: ${{ env.SMOKE_RUN_ID }}
          iris-config: ${{ env.IRIS_CONFIG }}
          wandb-entity: ${{ env.WANDB_ENTITY }}
          wandb-project: ${{ env.WANDB_PROJECT }}
          wandb-api-key: ${{ secrets.WANDB_API_KEY }}
          gha-run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # Upload Claude's Slack message (if it was written) so the separate
      # notify-slack job can pick it up. We run Slack notify in a separate
      # job because a job-level timeout can force-kill this runner before
      # in-job steps after Claude triage ever execute — see
      # https://github.com/marin-community/marin/actions/runs/24498461666.
      - name: Upload Slack message
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: slack-message
          path: slack_message.md
          retention-days: 1
          if-no-files-found: ignore

  # Parallel lane: verify every DatakitSource.staged_path resolves to a
  # non-empty prefix under gs://marin-us-central1. Cheap (metadata only) and
  # independent of the ferry, so runs alongside datakit-smoke.
  datakit-sources-staged:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: datakit-sources-staged
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --extra=cpu --no-default-groups

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.IRIS_CI_GCP_SA_KEY }}

      - name: Verify datakit source staging paths
        shell: bash -l {0}
        run: .venv/bin/python scripts/datakit/validate_source_staging.py

  # Separate job so Slack always fires, even if the main job is force-killed
  # after its grace window. `needs.*.result` reflects the upstream job
  # outcomes; failure()/cancelled() context functions only see this job's
  # steps.
  notify-slack:
    needs: [datakit-smoke, datakit-sources-staged]
    if: |
      always() && github.event_name == 'schedule' && (
        needs.datakit-smoke.result == 'failure' || needs.datakit-smoke.result == 'cancelled'
        || needs.datakit-sources-staged.result == 'failure' || needs.datakit-sources-staged.result == 'cancelled'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fallback-text: ":red_circle: *Datakit Smoke failed*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
