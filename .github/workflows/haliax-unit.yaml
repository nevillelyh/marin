name: "Haliax - Unit"

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        id: filter
        with:
          filters: |
            relevant:
              - 'lib/haliax/**'
              - 'uv.lock'
              - '.github/workflows/haliax-*.yaml'

  haliax-unit:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lib/haliax

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --package marin-haliax --dev
      - name: Test with pytest (JAX 0.9.2)
        run: |
          # Test with specific JAX version
          JAX_NUM_CPU_DEVICES=8 PYTHONPATH=tests:src:. uv run --package marin-haliax --with "jax[cpu]==0.9.2" pytest -c pyproject.toml tests
