name: Marin - Canary Ferry

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      target_tokens:
        description: 'Override training token budget'
        type: number
        required: false

permissions:
  contents: read
  issues: write    # claude triage files issues
  id-token: write  # claude-code-action OIDC

jobs:
  canary-ferry:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: canary-ferry
      cancel-in-progress: true
    env:
      RUN_ID: canary-tpu-${{ github.run_id }}-${{ github.run_attempt }}
      CANARY_ACCELERATOR: tpu
      CANARY_BATCH_SIZE: "512"
      CANARY_TARGET_TOKENS: "1000000000"
      CANARY_MIN_STEPS: "400"
      CANARY_MAX_LOSS: "8.0"
      CANARY_MAX_WALL_CLOCK: "7200"
      WANDB_ENTITY: marin-community
      WANDB_PROJECT: marin
      IRIS_CONFIG: lib/iris/examples/marin.yaml
      IRIS_CONTROLLER_SERVICE_ACCOUNT: iris-controller@hai-gcp-models.iam.gserviceaccount.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --extra=cpu --no-default-groups

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.IRIS_CI_GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.IRIS_CI_GCP_SSH_KEY }}
          SSH_KEY_PUB: ${{ secrets.IRIS_CI_GCP_SSH_KEY_PUB }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/google_compute_engine
          printf '%s\n' "$SSH_KEY_PUB" > ~/.ssh/google_compute_engine.pub
          chmod 600 ~/.ssh/google_compute_engine
          chmod 644 ~/.ssh/google_compute_engine.pub

      - name: Submit canary ferry
        id: submit
        shell: bash -l {0}
        run: |
          JOB_ID=$(.venv/bin/iris --config=${{ env.IRIS_CONFIG }} \
            job run --no-wait \
            --memory=2G --disk=4G --cpu=1 --extra=cpu \
            --priority production \
            --reserve v5p-8 \
            -e RUN_ID "$RUN_ID" \
            -e CANARY_ACCELERATOR "$CANARY_ACCELERATOR" \
            -e CANARY_BATCH_SIZE "$CANARY_BATCH_SIZE" \
            -e CANARY_TARGET_TOKENS "$CANARY_TARGET_TOKENS" \
            -e WANDB_ENTITY "$WANDB_ENTITY" \
            -e WANDB_PROJECT "$WANDB_PROJECT" \
            -e WANDB_API_KEY "$WANDB_API_KEY" \
            -e HF_TOKEN "$HF_TOKEN" \
            -- python -m experiments.ferries.canary_ferry)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted job: $JOB_ID"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CANARY_TARGET_TOKENS: ${{ inputs.target_tokens || env.CANARY_TARGET_TOKENS }}

      - name: Wait for canary ferry
        shell: bash -l {0}
        run: |
          uv run python scripts/workflows/iris_monitor.py wait \
            --job-id "${{ steps.submit.outputs.job_id }}" \
            --iris-config "${{ env.IRIS_CONFIG }}" \
            --poll-interval 30 \
            --timeout 14100 \
            --github-output

      - name: Validate canary metrics
        continue-on-error: ${{ inputs.target_tokens != '' }}
        shell: bash -l {0}
        # MARIN_PREFIX is required so mirror:// knows which gs://marin-* bucket
        # counts as "local" — without it the runner falls back to /tmp/marin,
        # _mirror_remote_prefixes() returns [] (to avoid anonymous-caller 401s
        # from gcsfs off-GCP), and the read raises FileNotFoundError. The
        # google-github-actions/auth step above provides the credentials
        # gcsfs needs to actually scan the remote buckets. Canary lands on v5p
        # in us-central1 or us-east5; picking us-central1 keeps the hit rate
        # high and lets mirror:// resolve either region.
        env:
          MARIN_PREFIX: gs://marin-us-central1
        run: .venv/bin/python scripts/canary/validate_canary_metrics.py

      - name: Summarize TPU canary profile
        continue-on-error: true
        shell: bash -l {0}
        run: |
          .venv/bin/python -m marin.profiling.cli summarize \
            --run-target "$RUN_ID" \
            --entity "$WANDB_ENTITY" \
            --project "$WANDB_PROJECT"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}

      - name: Capture failure diagnostics
        if: failure() || cancelled()
        continue-on-error: true
        shell: bash -l {0}
        env:
          JOB_ID: ${{ steps.submit.outputs.job_id }}
          DIAG_DIR: ${{ github.workspace }}/canary-diagnostics
        run: |
          mkdir -p "$DIAG_DIR"
          uv run python scripts/workflows/iris_monitor.py collect \
            --job-id "$JOB_ID" \
            --iris-config "${{ env.IRIS_CONFIG }}" \
            --provider gcp \
            --output-dir "$DIAG_DIR" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --controller-label iris-marin-controller \
            --service-account "$IRIS_CONTROLLER_SERVICE_ACCOUNT" \
            --ssh-key ~/.ssh/google_compute_engine

      - name: Upload diagnostics
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: canary-diagnostics
          path: canary-diagnostics/
          retention-days: 14
          if-no-files-found: ignore

      - name: Claude triage
        id: claude_triage
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        uses: ./.github/actions/claude-triage
        timeout-minutes: 30
        with:
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CLAUDE_MAX_OAUTH_TOKEN }}
          lane: tpu
          job-id: ${{ steps.submit.outputs.job_id }}
          run-id: ${{ env.RUN_ID }}
          iris-config: ${{ env.IRIS_CONFIG }}
          wandb-entity: ${{ env.WANDB_ENTITY }}
          wandb-project: ${{ env.WANDB_PROJECT }}
          wandb-api-key: ${{ secrets.WANDB_API_KEY }}
          gha-run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # Upload Claude's Slack message (if it was written) so the separate
      # notify-slack job can pick it up. We run Slack notify in a separate
      # job because a job-level timeout can force-kill this runner before
      # in-job steps after Claude triage ever execute — see
      # https://github.com/marin-community/marin/actions/runs/24498461666.
      - name: Upload Slack message
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: slack-message
          path: slack_message.md
          retention-days: 1
          if-no-files-found: ignore

  # Separate job so Slack always fires, even if the main job is force-killed
  # after its grace window. `needs.canary-ferry.result` reflects the main job
  # outcome; failure()/cancelled() context functions only see this job's steps.
  notify-slack:
    needs: canary-ferry
    if: always() && (needs.canary-ferry.result == 'failure' || needs.canary-ferry.result == 'cancelled') && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fallback-text: ":red_circle: *TPU Canary failed*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
