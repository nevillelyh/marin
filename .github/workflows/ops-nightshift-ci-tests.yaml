name: "Ops - Nightshift CI Tests"

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

concurrency:
  group: nightshift-ci-tests
  cancel-in-progress: false

jobs:
  ci-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NIGHTSHIFT_APP_ID }}
          private-key: ${{ secrets.NIGHTSHIFT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Audit recent CI tests
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python infra/scripts/nightshift_ci_tests.py
