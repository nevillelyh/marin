name: "Marin - Canary Ferry - CoreWeave"

# The canary submits a small training job to the shared `iris-ci` controller
# and reuses the warm `iris-ci-h100-8x` NodePool. Scheduled runs use the warm
# single H100 host; manual runs can request multiple GPU replicas on the same
# NodePool. Before requesting multiple replicas, make sure enough GPU nodes are
# already warm and free; cold/warm mixed starts can fail at JAX rendezvous.
# See https://github.com/marin-community/marin/issues/5480.
#
# `iris cluster start --fresh` rebuilds the controller/worker/task images from
# the current checkout and rolls the shared controller deployment to pick them
# up. The shared concurrency group `iris-coreweave-ci-shared` serialises this
# workflow with iris-smoke-coreweave.yaml so PR CI and the cron canary never roll
# the controller at the same time.
on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10 AM UTC
  workflow_dispatch:
    inputs:
      target_tokens:
        description: 'Override training token budget'
        type: number
        required: false
      gpu_replicas:
        description: 'Number of H100 GPU replicas'
        type: number
        default: 1
        required: false

permissions:
  contents: read   # actions/checkout
  packages: write  # docker login ghcr.io for iris cluster start
  issues: write    # claude triage files issues
  id-token: write  # claude-code-action OIDC

# Serialise with iris-smoke-coreweave.yaml — both rebuild/roll the shared
# iris-ci controller and submit jobs against the shared H100, so only one
# run is allowed cluster-wide at a time. cancel-in-progress=false so a
# mid-flight CI integration run is not killed by the cron firing.
concurrency:
  group: iris-coreweave-ci-shared
  cancel-in-progress: false

jobs:
  canary-ferry-cw:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RUN_ID: canary-gpu-${{ github.run_id }}-${{ github.run_attempt }}
      CANARY_ACCELERATOR: gpu
      CANARY_BATCH_SIZE: "16"
      CANARY_GPU_REPLICAS: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.gpu_replicas) || '1' }}
      # TODO(#5524): remove this override once Levanter profiler stop is
      # idempotent. Keeping the profile window off the final callback lets
      # CoreWeave validation proceed independently of that fix.
      CANARY_PROFILER_NUM_STEPS: "10"
      CANARY_TARGET_TOKENS: "6553600"
      CANARY_MIN_STEPS: "40"
      CANARY_MAX_LOSS: "8.0"
      WANDB_ENTITY: marin-community
      WANDB_PROJECT: marin
      IRIS_CONFIG: lib/iris/examples/coreweave-ci.yaml
      IRIS_NAMESPACE: iris-ci
      IRIS_MANAGED_LABEL: iris-iris-ci-managed

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --extra=cpu --extra=controller --no-default-groups

      - name: Write CoreWeave kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.CW_KUBECONFIG }}" > ~/.kube/coreweave-iris
          chmod 600 ~/.kube/coreweave-iris

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Clear leftover task pods from the previous run (canary or PR CI) so the
      # autoscaler recreates them with the images we're about to push.
      # NodePools survive — the H100 node is warm.
      - name: Reset stale task pods
        run: |
          export KUBECONFIG=~/.kube/coreweave-iris
          kubectl delete pods -n "$IRIS_NAMESPACE" -l "$IRIS_MANAGED_LABEL=true" \
            --grace-period=0 --ignore-not-found || true

      - name: Start shared iris-ci controller
        env:
          BUILDKIT_PROGRESS: plain
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: .venv/bin/iris -v --config=${{ env.IRIS_CONFIG }} cluster start --fresh

      - name: Connect to iris-ci controller
        run: |
          uv run python scripts/workflows/iris_monitor.py coreweave-controller \
            --namespace "$IRIS_NAMESPACE" \
            --kubeconfig "$HOME/.kube/coreweave-iris" \
            --log-path "$RUNNER_TEMP/iris-cw-port-forward.log"

      - name: Submit canary ferry
        id: submit
        shell: bash -l {0}
        run: |
          echo "GPU replicas: $CANARY_GPU_REPLICAS"
          JOB_ID=$(.venv/bin/iris --controller-url="$IRIS_CONTROLLER_URL" \
            job run --no-wait \
            --memory=2G --disk=4G --cpu=1 --extra=cpu \
            -e MARIN_PREFIX s3://marin-na/marin/ \
            -e RUN_ID "$RUN_ID" \
            -e CANARY_ACCELERATOR "$CANARY_ACCELERATOR" \
            -e CANARY_BATCH_SIZE "$CANARY_BATCH_SIZE" \
            -e CANARY_GPU_REPLICAS "$CANARY_GPU_REPLICAS" \
            -e CANARY_PROFILER_NUM_STEPS "$CANARY_PROFILER_NUM_STEPS" \
            -e CANARY_TARGET_TOKENS "$CANARY_TARGET_TOKENS" \
            -e WANDB_ENTITY "$WANDB_ENTITY" \
            -e WANDB_PROJECT "$WANDB_PROJECT" \
            -e WANDB_API_KEY "$WANDB_API_KEY" \
            -e HF_TOKEN "$HF_TOKEN" \
            -e AWS_ACCESS_KEY_ID "$R2_ACCESS_KEY_ID" \
            -e AWS_SECRET_ACCESS_KEY "$R2_SECRET_ACCESS_KEY" \
            -e AWS_ENDPOINT_URL "https://74981a43be0de7712369306c7b19133d.r2.cloudflarestorage.com" \
            -- python -m experiments.ferries.canary_ferry)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted job: $JOB_ID"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CANARY_TARGET_TOKENS: ${{ inputs.target_tokens || env.CANARY_TARGET_TOKENS }}

      - name: Wait for canary ferry
        shell: bash -l {0}
        run: |
          uv run python scripts/workflows/iris_monitor.py wait \
            --job-id "${{ steps.submit.outputs.job_id }}" \
            --controller-url "$IRIS_CONTROLLER_URL" \
            --poll-interval 30 \
            --timeout 10500 \
            --github-output

      - name: Validate canary metrics
        continue-on-error: ${{ inputs.target_tokens != '' }}
        shell: bash -l {0}
        run: .venv/bin/python scripts/canary/validate_canary_metrics.py
        env:
          MARIN_PREFIX: s3://marin-na/marin/
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://74981a43be0de7712369306c7b19133d.r2.cloudflarestorage.com

      - name: Summarize GPU canary profile
        continue-on-error: true
        shell: bash -l {0}
        run: |
          .venv/bin/python -m marin.profiling.cli summarize \
            --run-target "$RUN_ID" \
            --entity "$WANDB_ENTITY" \
            --project "$WANDB_PROJECT"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}

      - name: Capture failure diagnostics
        # Runs on both failures and cancellations — GHA timeouts surface as
        # cancelled(), not failure(). That gap hid two weeks of hung H100
        # provisioning before we noticed.
        if: failure() || cancelled()
        continue-on-error: true
        env:
          JOB_ID: ${{ steps.submit.outputs.job_id }}
          DIAG_DIR: /tmp/canary-diag
        run: |
          mkdir -p "$DIAG_DIR"
          if [ -n "${PF_LOG:-}" ] && [ -f "$PF_LOG" ]; then
            cp "$PF_LOG" "$DIAG_DIR/port-forward.log"
          fi
          uv run python scripts/workflows/iris_monitor.py collect \
            --job-id "$JOB_ID" \
            --controller-url "$IRIS_CONTROLLER_URL" \
            --provider coreweave \
            --output-dir "$DIAG_DIR" \
            --namespace "$IRIS_NAMESPACE" \
            --managed-label "$IRIS_MANAGED_LABEL" \
            --kubeconfig "$HOME/.kube/coreweave-iris" \
            --include-cluster-context

      - name: Upload diagnostics bundle
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: canary-diag-${{ github.run_id }}
          path: /tmp/canary-diag
          if-no-files-found: ignore
          retention-days: 30

      - name: Claude triage
        id: claude_triage
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        uses: ./.github/actions/claude-triage
        timeout-minutes: 30
        with:
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CLAUDE_MAX_OAUTH_TOKEN }}
          lane: gpu
          job-id: ${{ steps.submit.outputs.job_id }}
          run-id: ${{ env.RUN_ID }}
          iris-config: ${{ env.IRIS_CONFIG }}
          iris-namespace: ${{ env.IRIS_NAMESPACE }}
          wandb-entity: ${{ env.WANDB_ENTITY }}
          wandb-project: ${{ env.WANDB_PROJECT }}
          wandb-api-key: ${{ secrets.WANDB_API_KEY }}
          gha-run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # CoreWeave lane needs kubectl plus filesystem tools the GCP lane skips.
          allowed-tools: 'Bash(kubectl:*),Bash(gh:*),Bash(.venv/bin/iris:*),Bash(.venv/bin/python:*),Bash(cat:*),Bash(jq:*),Bash(head:*),Bash(tail:*),Bash(grep:*),Bash(ls:*),Bash(wc:*),Bash(find:*),Bash(awk:*),Bash(sed:*),Bash(date:*),Bash(echo:*),Bash(tr:*),Bash(sort:*),Bash(uniq:*),Bash(curl:*),Write,Read,Edit'

      # claude-code-action writes the full agent trace (prompt, tool calls,
      # tool results, final message) to this path. Uploading it is the only
      # way to see *what Claude actually did* after the fact — the step log
      # hides the transcript with "full output hidden for security".
      - name: Upload Claude triage log
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: claude-triage-log-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 30
          if-no-files-found: warn

      # Upload Claude's Slack message (if it was written) so the separate
      # notify-slack job can pick it up. We run Slack notify in a separate
      # job because a job-level timeout can force-kill this runner before
      # in-job steps after Claude triage ever execute — see
      # https://github.com/marin-community/marin/actions/runs/24498461666.
      - name: Upload Slack message
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: slack-message
          path: slack_message.md
          retention-days: 1
          if-no-files-found: ignore

      - name: Stop port-forward
        if: always()
        run: |
          if [ -n "${PF_PID:-}" ]; then
            kill "$PF_PID" 2>/dev/null || true
          fi
          pkill -f "kubectl.*$IRIS_NAMESPACE.*port-forward.*pod/iris-controller" 2>/dev/null || true
          pkill -f "kubectl.*port-forward.*$IRIS_NAMESPACE.*pod/iris-controller" 2>/dev/null || true

  # Separate job so Slack always fires, even if the main job is force-killed
  # after its grace window. `needs.canary-ferry-cw.result` reflects the main
  # job outcome; failure()/cancelled() context functions only see this job's
  # steps.
  notify-slack:
    needs: canary-ferry-cw
    if: always() && (needs.canary-ferry-cw.result == 'failure' || needs.canary-ferry-cw.result == 'cancelled') && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fallback-text: ":red_circle: *GPU Canary failed*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
